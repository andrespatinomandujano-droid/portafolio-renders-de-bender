<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Renders De Bender - Portafolio</title>
    
    <!-- Meta Tags para previsualización en WhatsApp y Redes Sociales -->
    <meta property="og:title" content="Los Renders De Bender | Experiencias BTL" />
    <meta property="og:description" content="Dirección de Arte 3D y Visualización Arquitectónica para Productores de Eventos." />
    <meta property="og:image" content="https://portafolioweblosrendersdebender.vercel.app/Render_RedBull.png" />
    <meta property="og:url" content="https://portafolioweblosrendersdebender.vercel.app/" />
    <meta property="og:type" content="website" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (para compilar React en el navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background-color: #0b0c10; color: #d4d4d8; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0c10; }
        ::-webkit-scrollbar-thumb { background: #f2a900; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Íconos SVG puros para evitar dependencias externas en Vercel
        const IconMonitorPlay = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="m10 10 5 3-5 3v-6z"/></svg>);
        const IconLayers = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>);
        const IconCamera = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>);
        const IconCoffee = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>);
        const IconMail = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>);
        const IconMapPin = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>);
        const IconInstagram = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>);
        const IconWhatsApp = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>);

        // DATA DEL PORTAFOLIO
        const PORTFOLIO_DATA = [
            { id: 'redbull', cat: 'A', catIcon: <IconMonitorPlay className="w-6 h-6"/>, catName: 'Festivales & Activaciones', title: 'Red Bull Festival Experience Hub', img: 'Render_RedBull.png', desc: 'Activación de alto impacto visual y estructural diseñada para festivales de música. Optimización de flujos de circulación y branding vertical.' },
            { id: 'corona', cat: 'A', catIcon: <IconMonitorPlay className="w-6 h-6"/>, catName: 'Festivales & Activaciones', title: 'Corona Beach Experience', img: 'Render_Corona.png', desc: 'Experiencia inmersiva y hospitalidad premium. Diseño tropical contemporáneo con materiales naturales.' },
            { id: 'samsung', cat: 'B', catIcon: <IconLayers className="w-6 h-6"/>, catName: 'Pabellones & Convenciones', title: 'Samsung Smart Living Pavilion', img: 'Render_Samsung.png', desc: 'Pabellón B2B inmersivo de dos niveles, integrando pantallas LED gigantes y ecosistemas de demostración de producto.' },
            { id: 'ps5', cat: 'B', catIcon: <IconLayers className="w-6 h-6"/>, catName: 'Pabellones & Convenciones', title: 'PlayStation Gaming Arena', img: 'Render_PS5.png', desc: 'Diseño arquitectónico comercial enfocado en estaciones de prueba de alto rendimiento y estética futurista.' },
            { id: 'nike', cat: 'C', catIcon: <IconCamera className="w-6 h-6"/>, catName: 'Retail Efímero & Pop-Ups', title: 'Nike Pop-Up Store', img: 'Render_Nike.png', desc: 'Visual merchandising avanzado con diseño modular desmontable e iluminación premium de producto.' },
            { id: 'apple', cat: 'C', catIcon: <IconCamera className="w-6 h-6"/>, catName: 'Retail Efímero & Pop-Ups', title: 'Apple Vision Pro Experience', img: 'Render_AppleVision.png', desc: 'Módulo de prueba inmersivo, utilizando materiales limpios, acrílicos curvos e iluminación difusa.' },
            { id: 'hotwheels', cat: 'C', catIcon: <IconCamera className="w-6 h-6"/>, catName: 'Retail Efímero & Pop-Ups', title: 'Hot Wheels Racing Island', img: 'Render_HotWheels.png', desc: 'Isla comercial experiencial que celebra la velocidad, el diseño y la innovación con exhibición interactiva.' },
            { id: 'lego', cat: 'C', catIcon: <IconCamera className="w-6 h-6"/>, catName: 'Retail Efímero & Pop-Ups', title: 'Lego Stand Creativo', img: 'Render_Lego02.png', desc: 'Stand de exhibición con un uso vibrante de acrílicos y exhibidores modulares de alto brillo.' },
            { id: 'dji', cat: 'C', catIcon: <IconCamera className="w-6 h-6"/>, catName: 'Retail Efímero & Pop-Ups', title: 'DJI Mini Drone', img: 'Render_Dji.jpeg', desc: 'Diseño de kiosco tecnológico de prueba de vuelo, enfocado en interacción directa con el usuario final.' },
            { id: 'starbucks', cat: 'D', catIcon: <IconCoffee className="w-6 h-6"/>, catName: 'Kioscos F&B', title: 'Starbucks Urban Coffee Hub', img: 'Render_Starbucks.png', desc: 'Kiosco comercial modular optimizado para flujo perimetral 360 grados con texturas de madera natural.' },
            { id: 'cocacola', cat: 'D', catIcon: <IconCoffee className="w-6 h-6"/>, catName: 'Kioscos F&B', title: 'Coca-Cola Retail Display', img: 'Render_Cocacola.png', desc: 'Exhibidor retro-futurista vibrante enfocado en iluminación de neón LED e identidad visual clásica.' }
        ];

        const ImageWithFallback = ({ src, alt }) => {
            const [error, setError] = useState(false);

            if (error) {
                return (
                    <div className="w-full h-full min-h-[300px] md:min-h-[500px] bg-zinc-900 flex flex-col items-center justify-center border border-zinc-800 p-8 text-center rounded-lg">
                        <div className="w-16 h-16 mb-4 text-zinc-700">
                            <IconLayers className="w-16 h-16" />
                        </div>
                        <p className="text-zinc-500 font-mono text-sm tracking-widest uppercase mb-2">Render no encontrado</p>
                        <p className="text-zinc-300 font-light text-lg break-all">{src}</p>
                    </div>
                );
            }

            return (
                <img 
                    src={src} 
                    alt={alt} 
                    onError={() => setError(true)}
                    className="w-full h-full object-cover transition-transform duration-700 hover:scale-105"
                />
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('All');
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const categories = ['All', 'A', 'B', 'C', 'D'];
            const filteredData = activeTab === 'All' ? PORTFOLIO_DATA : PORTFOLIO_DATA.filter(item => item.cat === activeTab);

            return (
                <div className="min-h-screen bg-[#0b0c10] text-zinc-300 font-sans selection:bg-[#f2a900] selection:text-black">
                    
                    {/* NAVBAR */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'bg-[#0b0c10]/95 backdrop-blur-md border-b border-zinc-800 py-4' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div className="text-xl font-black tracking-tighter text-white uppercase">
                                Bender<span className="text-[#f2a900]">.</span>
                            </div>
                            <div className="hidden md:flex gap-8 text-sm font-medium tracking-widest uppercase">
                                {categories.map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setActiveTab(cat)}
                                        className={`transition-colors duration-300 ${activeTab === cat ? 'text-[#f2a900]' : 'text-zinc-500 hover:text-white'}`}
                                    >
                                        {cat === 'All' ? 'Todo' : `Categoría ${cat}`}
                                    </button>
                                ))}
                            </div>
                            <a href="#contacto" className="text-xs font-bold uppercase tracking-widest border border-[#f2a900] text-[#f2a900] px-4 py-2 rounded-full hover:bg-[#f2a900] hover:text-black transition-colors duration-300">
                                Contactar
                            </a>
                        </div>
                    </nav>

                    <section className="relative pt-40 pb-20 md:pt-52 md:pb-32 px-6 md:px-12 max-w-7xl mx-auto flex flex-col justify-center min-h-[70vh]">
                        <div className="absolute top-20 right-10 text-[15vw] font-black text-white/5 leading-none select-none pointer-events-none tracking-tighter">
                            2026
                        </div>
                        
                        <div className="relative z-10 max-w-4xl">
                            <div className="w-16 h-1 bg-[#f2a900] mb-8"></div>
                            <h2 className="text-[#f2a900] font-mono text-sm md:text-base tracking-[0.3em] uppercase mb-4">
                                Portafolio Profesional
                            </h2>
                            <h1 className="text-5xl md:text-7xl lg:text-8xl font-black text-white uppercase tracking-tighter leading-[0.9] mb-8">
                                Diseño que <br />
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-white to-zinc-500">vende.</span>
                            </h1>
                            
                            <div className="grid md:grid-cols-2 gap-8 md:gap-16 mt-12 border-t border-zinc-800 pt-12">
                                <div>
                                    <p className="text-lg md:text-xl text-zinc-300 font-light leading-relaxed mb-4">
                                        Ayudamos a productoras, agencias BTL y organizadores de eventos a ganar pitches de alto nivel.
                                    </p>
                                    <p className="text-sm text-zinc-500 font-light leading-relaxed">
                                        Transformamos conceptos de marca en visualizaciones arquitectónicas hiperrealistas. Pensado bajo criterios de viabilidad técnica y alto impacto visual.
                                    </p>
                                </div>
                                <div className="flex flex-col justify-center">
                                    <div className="bg-[#14161a] p-6 rounded-lg border border-zinc-800/50">
                                        <h3 className="text-white font-bold mb-4 uppercase tracking-widest text-sm">Especialidades</h3>
                                        <ul className="space-y-3 text-sm text-zinc-400">
                                            <li className="flex items-center gap-3"><IconMonitorPlay className="w-4 h-4 text-[#f2a900]"/> Festivales & Activaciones</li>
                                            <li className="flex items-center gap-3"><IconLayers className="w-4 h-4 text-[#f2a900]"/> Pabellones & Convenciones</li>
                                            <li className="flex items-center gap-3"><IconCamera className="w-4 h-4 text-[#f2a900]"/> Retail Efímero & Pop-Ups</li>
                                            <li className="flex items-center gap-3"><IconCoffee className="w-4 h-4 text-[#f2a900]"/> Kioscos F&B</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="px-6 md:px-12 py-20 bg-[#14161a]">
                        <div className="max-w-7xl mx-auto">
                            {activeTab !== 'All' && (
                                <div className="mb-12">
                                    <h2 className="text-3xl md:text-5xl font-bold text-white uppercase tracking-tighter">
                                        {filteredData[0]?.catName}
                                    </h2>
                                    <p className="text-[#f2a900] font-mono mt-2 tracking-widest uppercase">Categoría {activeTab}</p>
                                </div>
                            )}

                            <div className="grid grid-cols-1 gap-16 md:gap-24">
                                {filteredData.map((project, index) => (
                                    <div key={project.id} className={`flex flex-col ${index % 2 !== 0 ? 'md:flex-row-reverse' : 'md:flex-row'} gap-8 md:gap-12 items-center group`}>
                                        
                                        <div className="w-full md:w-3/5 overflow-hidden rounded-xl bg-black relative">
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                                            <ImageWithFallback src={project.img} alt={project.title} />
                                        </div>

                                        <div className="w-full md:w-2/5 flex flex-col justify-center">
                                            <div className="flex items-center gap-3 mb-4 text-[#f2a900]">
                                                {project.catIcon}
                                                <span className="font-mono text-xs tracking-[0.2em] uppercase">{project.catName}</span>
                                            </div>
                                            <h3 className="text-3xl md:text-4xl font-black text-white uppercase tracking-tight mb-4 leading-none">
                                                {project.title.split(' ').map((word, i) => 
                                                    i === 0 ? <span key={i} className="block">{word}</span> : <span key={i}>{word} </span>
                                                )}
                                            </h3>
                                            <div className="w-12 h-1 bg-zinc-800 mb-6"></div>
                                            <p className="text-zinc-400 font-light leading-relaxed mb-8">
                                                {project.desc}
                                            </p>
                                            
                                            <div className="flex items-center gap-4 text-xs font-bold uppercase tracking-widest text-zinc-500">
                                                <span>Estructura Efímera</span>
                                                <span className="w-1 h-1 rounded-full bg-[#f2a900]"></span>
                                                <span>Visualización 3D</span>
                                            </div>
                                        </div>

                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer id="contacto" className="bg-[#0b0c10] pt-32 pb-12 px-6 md:px-12 border-t border-zinc-900">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-end">
                            <div>
                                <h2 className="text-4xl md:text-6xl font-black text-white uppercase tracking-tighter mb-4">
                                    Hagamos tu <br/>
                                    <span className="text-[#f2a900]">próximo evento.</span>
                                </h2>
                                <p className="text-zinc-500 text-lg mb-12 max-w-md">
                                    Listos para diseñar y visualizar experiencias ganadoras.
                                </p>
                                
                                <div className="space-y-4 font-mono text-sm text-zinc-400">
                                    <a href="mailto:losrendersdebender@gmail.com" className="flex items-center gap-4 hover:text-[#f2a900] transition-colors w-fit">
                                        <IconMail className="w-5 h-5" /> losrendersdebender@gmail.com
                                    </a>
                                    <a href="https://wa.me/5215610097248" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 hover:text-[#f2a900] transition-colors w-fit">
                                        <IconWhatsApp className="w-5 h-5" /> +52 1 56 1009 7248
                                    </a>
                                    <div className="flex items-center gap-4">
                                        <IconMapPin className="w-5 h-5" /> Cd Mx, México
                                    </div>
                                    <a href="https://www.instagram.com/losrendersdebender/" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 hover:text-[#f2a900] transition-colors w-fit">
                                        <IconInstagram className="w-5 h-5" /> @losrendersdebender
                                    </a>
                                </div>
                            </div>
                            
                            <div className="flex flex-col md:items-end justify-end">
                                <p className="text-zinc-700 text-xs uppercase tracking-widest mt-12 md:mt-0">
                                    © 2026 Los Renders de Bender. Todos los derechos reservados.
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
